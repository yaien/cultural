<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{.Page.Title}}</title>
    {{.Components.Fonts}}
    <link rel="icon" type="image/png" href="/assets/landing/favicon.png" />
    <link rel="stylesheet" href="/assets/static/landing/base.css" />
    <link rel="stylesheet" href="/assets/landing/styles.css" />

    {{if .InlineStyles}}
    <style type="text/css">
      {{.Components.Styles}}
    </style>
    {{else}}
    <link rel="stylesheet" href="{{ printf `/assets/landing/styles/%s.css` .Page.Name }}" />
    {{end}}
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  </head>
  <body>
    {{block "body" .}}{{end}}
  </body>
</html>
