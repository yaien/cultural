root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  args_bin = ["serve"]
  bin = "./tmp/cultural"
  cmd = "go build -o ./tmp/cultural ./cmd/cultural"
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "storage", "db", "dist"]
  exclude_file = []
  exclude_regex = ["_test.go", "min.js", "min.css"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = ""
  include_dir = []
  include_ext = ["go", "tpl", "html", "css", "js"]
  include_file = [".env"]
  kill_delay = "0s"
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  post_cmd = []
  pre_cmd = ["go generate ./..."]
  rerun = false
  rerun_delay = 500
  send_interrupt = false
  stop_on_error = false

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  silent = false
  time = false

[misc]
  clean_on_exit = true

[proxy]
  app_port = 3001
  enabled = true
  proxy_port = 3000

[screen]
  clear_on_rebuild = false
  keep_scroll = true
