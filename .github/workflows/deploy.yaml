name: Deploy
on: 
  push:
   branches: main
jobs:
  build:
    environment: Production
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - name: Build Binary
        run: GOOS=linux GOARCH=amd64 go build ./cmd/cultural
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{secrets.SERVER_PRIVATE_KEY}}
      - name: Deploy
        run: |
          echo $SERVER_USER@SERVER_IP
          rsync -avz cultural ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:deploy/cultural
          rsync -avz Dockerfile ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:deploy Dockerfile
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER.IP }} "./deploy/deploy.sh"
      
