name: Deploy
on: 
  push:
   branches: main
jobs:
  build:
    environment: Production
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - name: Build Binary
        run: GOOS=linux GOARCH=amd64 go build ./cmd/cultural
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{secrets.SERVER_PRIVATE_KEY}}
      - name: Deploy
        run: |
          echo $SERVER_PRIVATE_KEY > ~/.ssh/id_ed255
          rsync -avz cultural $SERVER_USER@$SERVER_IP:deploy/cultural
          rsync -avz Dockerfile $SERVER_USER@$SERVER_IP:deploy Dockerfile
          ssh $SERVER_USER:$SERVER.IP "./deploy/deploy.sh"
      
