name: Deploy
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Golang
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - name: Build Binary
        run: GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build ./cmd/cultural
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Build Docker Image
        run: docker build -t ghcr.io/${{ github.repository_owner }}/cultural:${{ github.sha }} .
      - name: Tag Docker Image
        run: docker tag ghcr.io/${{ github.repository_owner }}/cultural:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/cultural:latest
      - name: Push Docker Image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/cultural:${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/cultural:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{secrets.VPS_SSH_KEY}}
      - name: Setup SSH Host Key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
      - name: Deploy
        run: ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "./deploy.sh"
