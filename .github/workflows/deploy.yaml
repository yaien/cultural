name: Deploy
on: 
  push:
   branches: main
jobs:
  build:
    environment: Production
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - name: Build Binary
        run: GOOS=linux GOARCH=amd64 go build ./cmd/cultural
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{secrets.SERVER_PRIVATE_KEY}}
      - name: Add SSH Host Key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts
      - name: Deploy
        run: |
          rsync -avz cultural cultural@142.93.80.76:deploy/cultural
          rsync -avz Dockerfile cultural@142.93.80.76:deploy Dockerfile
          ssh cultural@142.93.80.76 "./deploy/deploy.sh"
      
